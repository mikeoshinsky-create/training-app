// ── ADAPTIVE NOTE PARSER ─────────────────────────────────────────────────────
const HARD_WORDS  = [“hard”,“difficult”,“struggled”,“couldn’t finish”,“couldn’t complete”,“heavy”,“too much”,“tough”,“brutal”,“exhausted”,“too heavy”,“failed”,“failure”,“couldn’t”,“couldn’t”];
const EASY_WORDS  = [“easy”,“light”,“too easy”,“felt good”,“more left”,“could do more”,“comfortable”,“breezy”,“flew through”,“too light”];
const PAIN_WORDS  = [“tight”,“hurt”,“pain”,“tweaked”,“skipped”,“ache”,“sore”,“aggravated”,“sharp”,“uncomfortable”,“bad”,“injury”,“strain”,“spasm”];

function parseNote(note) {
if (!note) return null;
const n = note.toLowerCase();
if (PAIN_WORDS.some(w => n.includes(w)))  return “pain”;
if (HARD_WORDS.some(w => n.includes(w)))  return “hard”;
if (EASY_WORDS.some(w => n.includes(w)))  return “easy”;
return null;
}

// ── RECOMMENDATION ENGINE ────────────────────────────────────────────────────
function getSessionEntries(exKey, log) {
const raw = (log[exKey]||[]).slice().sort((a,b)=>b.ts-a.ts);
const seen = new Map();
for (const e of raw) { const sid = e.sessionId||e.ts; if (!seen.has(sid)) seen.set(sid,e); }
return Array.from(seen.values());
}

function getRec(exKey, log, variantEx) {
const ex = variantEx;
if (!ex) return null;
const entries = getSessionEntries(exKey, log);
const bw = ex.unit===“BW”||ex.unit===“band”;

if (entries.length===0) return { weight:ex.weight, reps:ex.reps, sets:ex.sets, reason:“Starting baseline from your history”, isNew:true };

const last = entries[0];
const prev = entries[1];

// Adaptive: check last note for signals
const signal = parseNote(last.note);

if (signal===“pain”) {
return { weight: bw?0:Math.max(last.weight-5,0), reps:ex.reps, sets:ex.sets,
reason:“You noted discomfort — deloaded and reduced weight. Focus on form.”, deload:true, painFlag:true };
}

if (bw) {
if (signal===“easy”)  return { weight:0, reps:Math.min(last.reps+2,ex.reps+4), sets:last.sets, reason:“Felt easy — adding 2 reps” };
if (signal===“hard”)  return { weight:0, reps:Math.max(last.reps-1,5),         sets:last.sets, reason:“Felt hard — drop 1 rep to nail form” };
return { weight:0, reps:last.reps, sets:last.sets, reason:“Bodyweight — focus on form and duration” };
}

const hitTarget = last.reps>=ex.reps && last.sets>=ex.sets;
const prevHit   = prev && prev.reps>=ex.reps && prev.sets>=ex.sets;
const bump      = ex.unit.includes(“kg”) ? 2 : 5;
const drop      = ex.unit.includes(“kg”) ? 2 : 5;

// Note-based overrides
if (signal===“easy”) {
return { weight:last.weight+bump, reps:ex.reps, sets:ex.sets,
reason:`You noted it felt easy — bumping weight by ${bump}${ex.unit.includes("kg")?"kg":"lb"} early`, upgrade:true };
}
if (signal===“hard”) {
return { weight:last.weight, reps:Math.max(last.reps-1, Math.floor(ex.reps*0.8)), sets:ex.sets,
reason:“You noted it felt hard — holding weight, drop a rep to restore quality”, hold:true };
}

// Standard progression
if (last.reps < ex.reps-2) {
return { weight:Math.max(last.weight-drop,0), reps:ex.reps, sets:ex.sets,
reason:“Reps were low last session — slight deload to nail form”, deload:true };
}
if (hitTarget && prevHit) {
return { weight:last.weight+bump, reps:ex.reps, sets:ex.sets,
reason:`Hit target 2 sessions in a row — add ${bump}${ex.unit.includes("kg")?"kg":"lb"}`, upgrade:true };
}
if (hitTarget) {
return { weight:last.weight, reps:ex.reps, sets:ex.sets, reason:“Good session — hold weight and confirm again” };
}
return { weight:last.weight, reps:Math.min(last.reps+1,ex.reps), sets:ex.sets,
reason:last.reps<ex.reps?“Add 1 rep — building toward target”:“Maintain weight, focus on tempo” };
}

const recColor = rec?.upgrade?”#5BA85B”: rec?.painFlag?”#E8855B”: rec?.deload?”#C86B4A”: rec?.hold?”#D4A843”: rec?.isNew?”#4A8BC4”:”#888”;
const recLabel = rec?.upgrade?“↑ Level Up”: rec?.painFlag?“⚠ Recovery”: rec?.deload?“↓ Deload”: rec?.hold?“→ Hold”: rec?.isNew?“★ Starting”:“→ Target”;

const variantLabel = !hamptons && exDef.variants.length>1
? `Variant ${(variantIdx%exDef.variants.length)+1}/${exDef.variants.length}`
: hamptons ? “Hamptons” : null;

// Stable timestamp for this session’s entry — never changes on re-save/edit
const entryTs = useRef(null);

const handleSave = () => {
// Use the same ts every time so handleLog’s filter-by-sessionId deduplication works,
// AND getSessionEntries sees only one entry for this session (same sessionId).
if (!entryTs.current) entryTs.current = Date.now();
const entry = { weight:w, reps:r, sets:s, note, sessionId,
dateStr:new Date().toLocaleDateString(“en-US”,{month:“short”,day:“numeric”}),
ts: entryTs.current };
onLog(exDef.key, entry);
setSaved(entry); setDone(true); setOpen(false); setNote(””);
};

if (saved) { setW(saved.weight); setR(saved.reps); setS(saved.sets); setNote(saved.note||””); }
setDone(false); setOpen(true);
};

function HistoryTab({ log, rotationHistory }) {
// Build a map of sessionId → { dateStr, tag, label, color, entries[] }
// Each log entry has sessionId, ts, dateStr. We match sessionIds back to

// Collect all entries with their exercise name
const allEntries = [];
for (const [key, entries] of Object.entries(log)) {
let exDef = null;
for (const s of SESSIONS) { const f = s.exercises.find(e => e.key === key); if (f) { exDef = f; break; } }
if (!exDef) continue;
for (const e of entries) {
// Figure out which session this entry belongs to by matching sessionId prefix (ts-based)
allEntries.push({ …e, exKey: key, exName: exDef.variants[0].name, unit: exDef.variants[0].unit });

g.entries.push(e);

export default function App() {
const [tab,       setTab]      = useState(“today”);
const [log,       setLog]      = useState(()=>load(SK)||{});
const [rotation,  setRotation] = useState(()=>load(RK)||{current:0,history:[],cycle:1});
// variantIndices: { [sessionId_A|B|C]: { [exKey]: variantIdx } }
const [variants,  setVariants] = useState(()=>load(VRK)||{A:{},B:{},C:{}});
const [settings,  setSettings] = useState(()=>load(STK)||{hamptons:false});
const [sessionId] = useState(()=>Date.now().toString());

const handleLog = (exKey, entry) => {
const existing = log[exKey]||[];
const filtered = existing.filter(e=>e.sessionId!==entry.sessionId);
const updated  = { …log, [exKey]:[…filtered,entry] };
setLog(updated); save(SK,updated);
};

const handleFinish = () => {
const cur   = SESSIONS[rotation.current];
const next  = (rotation.current+1)%3;
const completingCycle = rotation.current === 2; // C is last — cycle complete
const newCycle = completingCycle ? (rotation.cycle||1)+1 : (rotation.cycle||1);
// Advance one variant per exercise in the completed session
const newV  = { …variants };
newV[cur.id] = { …(newV[cur.id]||{}) };
for (const exDef of cur.exercises) {
const cur_idx = newV[cur.id][exDef.key]||0;
newV[cur.id][exDef.key] = (cur_idx+1) % exDef.variants.length;
}
const updatedRot = {
current: next,
cycle: newCycle,
history: […rotation.history, {
session:cur.id, label:cur.label, tag:cur.tag, color:cur.color,
cycle: rotation.cycle||1,
dateStr:new Date().toLocaleDateString(“en-US”,{month:“short”,day:“numeric”}),
ts:Date.now()
}].slice(-60),
};
setVariants(newV); save(VRK,newV);
setRotation(updatedRot); save(RK,updatedRot);
};

const toggleHamptons = () => {
const updated = { …settings, hamptons:!settings.hamptons };
setSettings(updated); save(STK,updated);
};

const handleReset = () => {
const empty = {};
setLog(empty); save(SK,empty);
const rot = {current:0,history:[],cycle:1}; setRotation(rot); save(RK,rot);
const vars = {A:{},B:{},C:{}}; setVariants(vars); save(VRK,vars);
};

const cur = SESSIONS[rotation.current];
const nxt = SESSIONS[(rotation.current+1)%3];
const curVariants = variants[cur.id]||{};

return (
<div style={{ fontFamily:“Georgia,‘Times New Roman’,serif”, background:”#0F0F0F”, minHeight:“100vh”, color:”#E8E0D0” }}>
